# Publish to PyPI (OIDC) and npm when you push a version tag: git tag v0.1.0 && git push origin v0.1.0
#
# PyPI: https://docs.pypi.org/trusted-publishers/adding-a-publisher/
#   - Project → Manage → Publishing → Add a pending publisher (GitHub, this repo, workflow: release.yml)
# npm: add repository secret NPM_TOKEN (granular token with publish for own-your-code-mcp)
#
# If PyPI shows invalid-publisher / invalid-pending-publisher: the GitHub Environment in your
# PyPI trusted publisher (if any) must match this workflow. If you left Environment blank on PyPI,
# do not add `environment:` under the pypi job. See: https://docs.pypi.org/trusted-publishers/troubleshooting/

name: Release

on:
  push:
    tags:
      - "v*.*.*"

# Avoid two tag pushes racing (duplicate uploads / confusing red runs).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  npm:
    name: Publish npm shim
    # Skip when secret is unset so PyPI-only releases still succeed.
    if: secrets.NPM_TOKEN
    needs: pypi
    runs-on: ubuntu-latest
    # PyPI is the source of truth; npm is optional — don’t fail the whole run if npm rejects.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: npm publish
        working-directory: npm/own-your-code-mcp
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
