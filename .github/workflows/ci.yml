name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install core + dev deps
        run: pip install -e ".[dev]"

      - name: Install optional deps (embeddings, multi-language extractors)
        run: pip install sentence-transformers numpy tree-sitter tree-sitter-python tree-sitter-javascript tree-sitter-go

      - name: Lint (ruff)
        run: |
          pip install ruff --quiet
          ruff check src/ api/ tests/ --select E,F,W --ignore E501 || true

      - name: Run tests
        run: pytest -x -q

  smoke:
    name: Install smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: pip install -e .

      - name: Smoke import
        run: |
          python3 -c "
          from src import db
          from src.extractor import scan_project, scan_project_multi
          from src.extractors import get_extractor, SUPPORTED_EXTENSIONS
          from src import embeddings as emb
          print('core imports ok')
          print('supported extensions:', sorted(SUPPORTED_EXTENSIONS))
          "

      - name: MCP server smoke
        run: python3 -c "from src.server import mcp; print('MCP server ok, name:', mcp.name)"

  ui:
    name: UI build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Build UI
        working-directory: ui
        run: npm ci && npm run build
